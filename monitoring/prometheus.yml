global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # If you have Jenkins Prometheus Plugin installed, you can scrape it here:
  # - job_name: 'jenkins'
  #   metrics_path: '/prometheus'
  #   static_configs:
  #     - targets: ['host.docker.internal:8080'] # Replace with your Jenkins host IP
