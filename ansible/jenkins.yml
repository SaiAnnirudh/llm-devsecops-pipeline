- hosts: jenkins
  become: yes
  tasks:
    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

- hosts: jenkins
  become: yes
  tasks:
    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Copy custom Jenkins Dockerfile
      copy:
        src: Dockerfile.jenkins
        dest: /home/ec2-user/Dockerfile.jenkins

    - name: Build custom Jenkins image
      command: docker build -t custom-jenkins -f /home/ec2-user/Dockerfile.jenkins /home/ec2-user

    - name: Remove old Jenkins container if it exists
      command: docker rm -f jenkins
      ignore_errors: yes

    - name: Run Jenkins container
      command: >
        docker run -d
        --name jenkins
        -p 8080:8080
        -p 50000:50000
        -v /var/run/docker.sock:/var/run/docker.sock
        -u root
        --restart unless-stopped
        custom-jenkins
      ignore_errors: yes
